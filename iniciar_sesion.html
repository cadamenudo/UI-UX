<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #FFFFFF;
      margin: 0;
      padding: 0;
      color: #111827;
      display: flex;
      justify-content: center;
    }

    .login-container {
      max-width: 400px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 2vh 1.5rem;
      margin-top: 1vh;
      box-sizing: border-box;
      text-align: center;
    }

    .logo {
      width: 300px;
      margin-bottom: 0.25rem;
    }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 100%;
    }

    .input-group input {
      padding: 0.75rem 1rem;
      border: 1px solid #D1D5DB;
      border-radius: 10px;
      font-size: 1rem;
      width: 100%;
      outline: none;
      box-sizing: border-box;
    }

    .input-password {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 1rem;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .input-password input {
      padding-right: 2.5rem;
    }

    button[type="submit"] {
      background-color: #3956E8;
      color: white;
      padding: 0.75rem;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .registro-link, .forgot-link {
      font-size: 0.9rem;
      text-align: center;
    }

    .registro-link a, .forgot-link a {
      color: #3956E8;
      text-decoration: none;
      font-weight: bold;
    }

    /* FOOTER */
    .footer {
      margin-top: 25px;
      text-align: center;
    }

    .support-title {
      font-size: 13px;
      font-weight: 600;
      color: #6B7280;
      margin-bottom: 4px;
    }

    .support-text {
      font-size: 12px;
      color: #6B7280;
      margin: 2px 0;
    }

    .support-text a {
      color: #3956E8;
      text-decoration: none;
    }

    .legal-links {
      margin-top: 8px;
      font-size: 12px;
    }

    .legal-links a {
      color: #3956E8;
      text-decoration: none;
      font-weight: 500;
    }

    .legal-links span {
      margin: 0 6px;
      color: #9CA3AF;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 99;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .modal-content {
      background-color: #fff;
      margin: 10% auto;
      padding: 1.5rem;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 14px;
      background: #3956E8;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="login-container">

  <img src="https://cadamenudo.github.io/UI-UX/assets/logo/cadamenudo_logo_BLUE.png" class="logo">

  <h2>Iniciar Sesión</h2>

  <form>

    <div class="input-group">
      <input type="email" placeholder="Correo">
    </div>

    <div class="input-group input-password">
      <input type="password" placeholder="Contraseña">
      <span class="toggle-password" onclick="togglePassword()">👁</span>
    </div>

    <button type="submit">ENTRAR</button>

    <div class="registro-link">
      ¿No tienes cuenta? <a href="#">Regístrate</a>
    </div>

    <div class="forgot-link">
      <a href="#">¿Has olvidado tu contraseña?</a>
    </div>

  </form>

  <!-- FOOTER -->
  <div class="footer">
    <p class="support-title">¿Preguntas?</p>
    <p class="support-text">Servicio al consumidor</p>
    <p class="support-text">
      <a href="tel:+17862029171">+1 (786) 202-9171</a> & 
      <a href="tel:+18507400274">+1 (850) 740-0274</a>
    </p>
    <p class="support-text">
      <a href="mailto:tech@cadamenudo.com">tech@cadamenudo.com</a>
    </p>
    <div class="legal-links">
      <a href="#" onclick="abrirModal('modalTerminos')">Términos</a>
      <span>•</span>
      <a href="#" onclick="abrirModal('modalPrivacidad')">Privacidad</a>
    </div>
  </div>

</div>

<!-- MODALES -->
<div id="modalTerminos" class="modal">
  <div class="modal-content">
    <button class="close" onclick="cerrarModal('modalTerminos')">X</button>
    <iframe src="terminos.html" width="100%" height="300"></iframe>
  </div>
</div>

<div id="modalPrivacidad" class="modal">
  <div class="modal-content">
    <button class="close" onclick="cerrarModal('modalPrivacidad')">X</button>
    <iframe src="privacidad.html" width="100%" height="300"></iframe>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.querySelector('input[type="password"]');
  input.type = input.type === "password" ? "text" : "password";
}

function abrirModal(id) {
  document.getElementById(id).style.display = "block";
}

function cerrarModal(id) {
  document.getElementById(id).style.display = "none";
}
</script>

</body>
</html>
