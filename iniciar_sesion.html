<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <!-- Safe area iPhone -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Iniciar Sesión</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #FFFFFF;
      margin: 0;
      padding: 0;
      color: #111827;
      display: flex;
      justify-content: center;
    }

    .login-container {
      max-width: 400px;
      width: 100%;
      padding: calc(2rem + env(safe-area-inset-top)) 1.5rem 2.5rem;
      box-sizing: border-box;
      text-align: center;
    }

    .logo {
      width: 260px;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-group input {
      padding: 0.75rem 1rem;
      border: 1px solid #D1D5DB;
      border-radius: 10px;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
    }

    .input-password {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 1rem;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    button[type="submit"] {
      background-color: #3956E8;
      color: white;
      padding: 0.75rem;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .registro-link, .forgot-link {
      font-size: 0.9rem;
    }

    .registro-link a, .forgot-link a {
      color: #3956E8;
      text-decoration: none;
      font-weight: bold;
    }

    /* FOOTER NUEVO */
    .footer {
      margin-top: 2rem;
      border-top: 1px solid #E5E7EB;
      padding-top: 1.2rem;
    }

    .support-title {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .support-subtitle {
      font-size: 0.75rem;
      color: #64748B;
      margin-bottom: 1rem;
    }

    .support-icons {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 1rem;
    }

    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .icon-item a {
      width: 56px;
      height: 56px;
      background: #3956E8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 14px rgba(57, 86, 232, 0.18);
      transition: transform 0.18s ease;
    }

    .icon-item a:active {
      transform: scale(0.94);
    }

    .icon-item img {
      width: 24px;
      filter: brightness(0) invert(1);
    }

    .icon-item span {
      font-size: 11px;
      color: #64748B;
      margin-top: 6px;
      font-weight: 600;
    }

    .legal-links {
      font-size: 12px;
    }

    .legal-links a {
      color: #3956E8;
      text-decoration: none;
      font-weight: 500;
    }

    .legal-links span {
      margin: 0 6px;
      color: #9CA3AF;
    }
  </style>
</head>

<body>

<div class="login-container">

  <img src="https://cadamenudo.github.io/UI-UX/assets/logo/cadamenudo_logo_BLUE.png" class="logo">

  <h2>Iniciar Sesión</h2>

  <form>

    <div class="input-group">
      <input type="email" placeholder="Correo">
    </div>

    <div class="input-group input-password">
      <input type="password" placeholder="Contraseña">
      <span class="toggle-password" onclick="togglePassword()">👁</span>
    </div>

    <button type="submit">ENTRAR</button>

    <div class="registro-link">
      ¿No tienes cuenta? <a href="#">Regístrate</a>
    </div>

    <div class="forgot-link">
      <a href="#">¿Has olvidado tu contraseña?</a>
    </div>

  </form>

  <!-- FOOTER -->
  <div class="footer">

    <p class="support-title">¿Necesitas ayuda?</p>
    <p class="support-subtitle">Servicio al consumidor</p>

    <div class="support-icons">

      <div class="icon-item">
        <a href="https://wa.me/17862027191?text=Hola%20necesito%20ayuda%20con%20Cada%20Menudo">
          <img src="https://cadamenudo.github.io/UI-UX/assets/icons/WS_blue_icon.png">
        </a>
        <span>Mensaje</span>
      </div>

      <div class="icon-item">
        <a href="mailto:tech@cadamenudo.com">
          <img src="https://cadamenudo.github.io/UI-UX/assets/icons/email_blue_icon.png">
        </a>
        <span>Email</span>
      </div>

      <div class="icon-item">
        <a href="tel:+18507400274">
          <img src="https://cadamenudo.github.io/UI-UX/assets/icons/phone_blue_icon.png">
        </a>
        <span>Llamar</span>
      </div>

    </div>

    <div class="legal-links">
      <a href="#">Términos</a>
      <span>•</span>
      <a href="#">Privacidad</a>
    </div>

  </div>

</div>

<script>
function togglePassword() {
  const input = document.querySelector('input[type="password"]');
  input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
