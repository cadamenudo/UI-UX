<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Cada Menudo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #5342e8;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      color: white;
      display: flex;
      flex-direction: column;
      background: #5342e8;
    }

    a {
      text-decoration: none;
      display: inline-block;
    }

    /* Header */
    .header {
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: env(safe-area-inset-top) 16px 10px;
      background: #5342e8;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    .header img {
      height: 64px; /* 🔥 más grande */
    }

    .signin {
      background: white;
      color: #3956E8;
      padding: 6px 14px;
      border-radius: 6px;
      font-weight: 600;
    }

    /* Background */
    .background {
      position: absolute;
      top: 70px;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 0;
    }

    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(83,66,232,0.2),
        rgba(83,66,232,0.15),
        rgba(83,66,232,0.25)
      );
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 20px calc(20px + env(safe-area-inset-bottom));
      text-align: center;
    }

    .card {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card h1 {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .card p {
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,0.9);
    }

    /* Button */
    .btn {
      background: #E8C239; /* 🔥 color llamativo */
      color: #000;
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      margin-top: 10px;
    }

    .arrow {
      font-size: 18px;
      margin-left: 6px;
      font-weight: bold;
    }

    .subtext {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }

  </style>
</head>

<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <img src="https://cadamenudo.github.io/UI-UX/assets/logo/cada%20menudo%20logo%20WHITE.png" alt="Cada Menudo"/>
    
    <a href="https://cadamenudo.github.io/UI-UX/iniciar_sesion.html" class="signin">
      Ingresar
    </a>
  </div>

  <!-- Background -->
  <div class="background">
    <img src="https://cadamenudo.github.io/UI-UX/assets/logo/CM-app-image.png" alt="App Cada Menudo"/>
    <div class="overlay"></div>
  </div>

  <!-- Content -->
  <div class="content">

    <div class="card">
      <h1>Tu dinero, claro en segundos</h1>
      <p>
        Registra ingresos, gastos y ahorros.
        Visualiza tu dinero y toma mejores decisiones.
      </p>
    </div>

    <a href="https://cadamenudo.github.io/UI-UX/apple-2nd-card.html" class="btn">
      Comenzar <span class="arrow">›</span>
    </a>

    <div class="subtext">
      Crea o renueva tu membresía
    </div>

  </div>

</div>

</body>
</html>
