<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cada Menudo AI - Nueva transacción</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  font-family:'Nunito',sans-serif !important;
  background:#ffffff;
  color:#1d1d1f;
}

body,
button,
input,
label,
span,
div,
p,
h1{
  font-family:'Nunito',sans-serif !important;
}

.screen{
  min-height:100vh;
  max-width:760px;
  margin:auto;
  padding:70px 24px 40px;
}

.header{
  text-align:center;
}

.header h1{
  font-size:32px;
  font-weight:700;
  color:#43434a;
  margin-bottom:8px;
}

.header p{
  font-size:22px;
  font-weight:600;
  color:#7280a1;
}

.progress-row{
  margin-top:22px;
  display:flex;
  align-items:center;
  gap:16px;
}

.progress-track{
  flex:1;
  height:7px;
  background:#ddd9ff;
  border-radius:20px;
  overflow:hidden;
}

.progress-fill{
  width:50%;
  height:100%;
  background:#5a49f8;
}

.step{
  font-size:22px;
  font-weight:800;
  color:#666;
}

.card{
  margin-top:38px;
  background:#fff;
  border-radius:34px;
  box-shadow:0 18px 35px rgba(0,0,0,.08);
  padding:34px 28px 30px;
  position:relative;
}

.close{
  position:absolute;
  top:24px;
  right:24px;
  width:56px;
  height:56px;
  border:none;
  border-radius:10px;
  background:#e63950;
  color:#fff;
  font-size:34px;
  font-weight:800;
  cursor:pointer;
}

.title{
  margin-top:82px;
  text-align:center;
  font-size:31px;
  line-height:1.35;
  font-weight:900;
  margin-bottom:34px;
}

.photo-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:22px;
}

.photo-btn{
  background:#3956E8;
  color:#fff;
  border:none;
  border-radius:22px;
  min-height:78px;
  padding:14px 18px;
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:12px;
  text-align:center;
  cursor:pointer;
}

.icon{
  width:36px;
  height:36px;
  min-width:36px;
  background:#fff;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.icon svg{
  width:18px;
  height:18px;
  stroke:#3956E8;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.photo-btn span{
  font-size:18px;
  font-weight:800;
  line-height:1.2;
}

.manual{
  width:100%;
  height:72px;
  border-radius:22px;
  border:2px solid #3956E8;
  background:#fff;
  color:#3956E8;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
  margin-bottom:24px;
}

.note{
  font-size:18px;
  line-height:1.55;
  font-weight:600;
  color:#7280a1;
}

input[type=file]{
  display:none;
}

@media(max-width:640px){

  .screen{
    padding:50px 16px 30px;
  }

  .header h1{
    font-size:24px;
  }

  .header p{
    font-size:18px;
  }

  .title{
    font-size:25px;
    margin-top:72px;
  }

  .photo-grid{
    grid-template-columns:1fr;
  }

  .photo-btn{
    min-height:72px;
    justify-content:flex-start;
  }

  .photo-btn span{
    font-size:17px;
  }

  .manual{
    font-size:18px;
    height:64px;
  }

  .close{
    width:48px;
    height:48px;
    font-size:28px;
  }
}
</style>
</head>

<body>

<div class="screen">

  <div class="header">
    <h1>Cada Menudo AI - Nueva transacción</h1>
    <p>Paso 1 de 2 · Subir recibo</p>
  </div>

  <div class="progress-row">
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <div class="step">1 / 2</div>
  </div>

  <div class="card">

    <button class="close">×</button>

    <div class="title">
      ¿Quieres que Cada Menudo lo haga por ti?
    </div>

    <div class="photo-grid">

      <label for="cameraInput" class="photo-btn">
        <div class="icon">
          <svg viewBox="0 0 24 24">
            <path d="M4 7h3l1.5-2h7L17 7h3v11H4z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <span>Tomar foto</span>
      </label>

      <input type="file" id="cameraInput" accept="image/*" capture="environment">

      <label for="galleryInput" class="photo-btn">
        <div class="icon">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="5" width="16" height="14" rx="2"/>
            <circle cx="9" cy="10" r="1.5"/>
            <path d="M7 16l4-4 3 3 3-2 2 3"/>
          </svg>
        </div>
        <span>Elegir galería</span>
      </label>

      <input type="file" id="galleryInput" accept="image/*">

    </div>

    <button class="manual">
      No, prefiero hacerlo manual
    </button>

    <div class="note">
      Sube tu recibo y pre-llenamos la transacción.<br>
      Luego podrás revisar y editar antes de guardar.
    </div>

  </div>

</div>

</body>
</html>
