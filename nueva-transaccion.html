<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Cada Menudo AI - Nueva transacción</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  font-family:'Nunito',sans-serif;
  background:#ffffff;
  color:#1d1d1f;
}

body{
  display:flex;
  justify-content:center;
}

/* IPHONE SIZE */
.phone{
  width:100%;
  max-width:430px;   /* iPhone Pro Max width */
  min-height:100vh;
  background:#fff;
}

.screen{
  padding:52px 16px 34px;
}

/* HEADER */
.header{
  text-align:center;
}

.header h1{
  font-size:22px;
  font-weight:700;
  color:#43434a;
  line-height:1.25;
  margin-bottom:8px;
}

.header p{
  font-size:16px;
  font-weight:600;
  color:#7280a1;
}

/* PROGRESS */
.progress-row{
  margin-top:18px;
  display:flex;
  align-items:center;
  gap:10px;
}

.progress-track{
  flex:1;
  height:6px;
  background:#ddd9ff;
  border-radius:99px;
  overflow:hidden;
}

.progress-fill{
  width:50%;
  height:100%;
  background:#5a49f8;
}

.step{
  font-size:14px;
  font-weight:800;
  color:#666;
}

/* CARD */
.card{
  margin-top:24px;
  background:#fff;
  border-radius:28px;
  box-shadow:0 12px 30px rgba(0,0,0,.08);
  padding:22px 18px 22px;
  position:relative;
}

.close{
  position:absolute;
  top:18px;
  right:18px;
  width:42px;
  height:42px;
  border:none;
  border-radius:10px;
  background:#e63950;
  color:#fff;
  font-size:26px;
  font-weight:900;
  cursor:pointer;
}

.title{
  margin-top:62px;
  text-align:center;
  font-size:24px;
  line-height:1.35;
  font-weight:900;
  margin-bottom:24px;
}

/* BUTTONS */
.photo-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin-bottom:16px;
}

.photo-btn{
  width:100%;
  background:#3956E8;
  color:#fff;
  border:none;
  border-radius:18px;
  min-height:62px;
  padding:0 16px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
}

.icon{
  width:30px;
  height:30px;
  min-width:30px;
  background:#fff;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.icon svg{
  width:16px;
  height:16px;
  stroke:#3956E8;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.photo-btn span{
  font-size:17px;
  font-weight:800;
}

.manual{
  width:100%;
  height:60px;
  border-radius:18px;
  border:2px solid #3956E8;
  background:#fff;
  color:#3956E8;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  margin-bottom:18px;
}

.note{
  font-size:16px;
  line-height:1.45;
  font-weight:600;
  color:#7280a1;
}

input[type=file]{
  display:none;
}
</style>
</head>

<body>

<div class="phone">

<div class="screen">

  <div class="header">
    <h1>Cada Menudo AI - Nueva transacción</h1>
    <p>Paso 1 de 2 · Subir recibo</p>
  </div>

  <div class="progress-row">
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <div class="step">1 / 2</div>
  </div>

  <div class="card">

    <button class="close">×</button>

    <div class="title">
      ¿Quieres que Cada Menudo lo haga por ti?
    </div>

    <div class="photo-grid">

      <label for="cameraInput" class="photo-btn">
        <div class="icon">
          <svg viewBox="0 0 24 24">
            <path d="M4 7h3l1.5-2h7L17 7h3v11H4z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <span>Tomar foto</span>
      </label>

      <input type="file" id="cameraInput" accept="image/*" capture="environment">

      <label for="galleryInput" class="photo-btn">
        <div class="icon">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="5" width="16" height="14" rx="2"/>
            <circle cx="9" cy="10" r="1.5"/>
            <path d="M7 16l4-4 3 3 3-2 2 3"/>
          </svg>
        </div>
        <span>Elegir galería</span>
      </label>

      <input type="file" id="galleryInput" accept="image/*">

    </div>

    <button class="manual">
      No, prefiero hacerlo manual
    </button>

    <div class="note">
      Sube tu recibo y pre-llenamos la transacción.<br>
      Luego podrás revisar y editar antes de guardar.
    </div>

  </div>

</div>
</div>

</body>
</html>
