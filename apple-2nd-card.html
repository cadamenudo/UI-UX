<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cada Menudo</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #FFFFFF;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
      padding: 2rem 1.5rem 2.5rem;
      box-sizing: border-box;
    }

    .logo {
      width: 260px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 2rem;
      color: #111827;
    }

    .btn {
      width: 100%;
      padding: 0.95rem;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      margin-bottom: 1rem;
      font-family: inherit;
    }

    .btn-primary {
      background: #3956E8;
      color: white;
    }

    .btn-secondary {
      background: white;
      color: #3956E8;
      border: 2px solid #3956E8;
    }

    /* FOOTER */
    .footer {
      margin-top: 2.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid #E5E7EB;
      text-align: center;
    }

    .support-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: #111827;
      margin-bottom: 0.2rem;
    }

    .support-subtitle {
      font-size: 0.8rem;
      color: #64748B;
      margin-bottom: 1rem;
    }

    /* ICONOS */
    .support-icons {
      display: flex;
      justify-content: center;
      gap: 36px;
      margin-bottom: 1.2rem;
    }

    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .icon-item a {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F1F5F9;
      border-radius: 50%;
      transition: transform 0.15s ease;
    }

    .icon-item a:hover {
      transform: scale(1.1);
    }

    .icon-item img {
      width: 24px;
      height: 24px;
    }

    .icon-item span {
      font-size: 11px;
      color: #64748B;
      margin-top: 6px;
      font-weight: 600;
    }

    .legal-links {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      font-size: 0.8rem;
    }

    .legal-links a {
      color: #64748B;
      text-decoration: none;
      font-weight: 700;
    }

    .legal-dot {
      color: #CBD5E1;
    }
  </style>
</head>

<body>

<div class="container">

  <img src="https://cadamenudo.github.io/UI-UX/assets/logo/cadamenudo_logo_BLUE.png" class="logo">

  <h1>Bienvenido a Cada Menudo</h1>

  <button class="btn btn-primary" onclick="location.href='registro.html'">
    Crear cuenta
  </button>

  <button class="btn btn-secondary" onclick="location.href='https://cadamenudo.github.io/UI-UX/iniciar_sesion.html'">
    Ingresar
  </button>

  <!-- FOOTER -->
  <div class="footer">

    <p class="support-title">¿Necesitas ayuda?</p>
    <p class="support-subtitle">Servicio al consumidor</p>

    <div class="support-icons">

      <!-- Mensaje -->
      <div class="icon-item">
        <a href="https://wa.me/17862027191?text=Hola%20necesito%20ayuda%20con%20Cada%20Menudo" target="_blank">
          <img src="https://cadamenudo.github.io/UI-UX/assets/icons/WS_blue_icon.png" alt="Mensaje">
        </a>
        <span>Mensaje</span>
      </div>

      <!-- Email -->
      <div class="icon-item">
        <a href="mailto:tech@cadamenudo.com">
          <img src="https://cadamenudo.github.io/UI-UX/assets/icons/email_blue_icon.png" alt="Email">
        </a>
        <span>Email</span>
      </div>

      <!-- Llamar -->
      <div class="icon-item">
        <a href="tel:+18507400274">
          <img src="https://cadamenudo.github.io/UI-UX/assets/icons/phone_blue_icon.png" alt="Llamar">
        </a>
        <span>Llamar</span>
      </div>

    </div>

    <div class="legal-links">
      <a href="terminos.html">Términos</a>
      <span class="legal-dot">•</span>
      <a href="privacidad.html">Privacidad</a>
    </div>

  </div>

</div>

</body>
</html>
