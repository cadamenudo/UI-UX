<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cada Menudo</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #FFFFFF;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .logo {
      width: 260px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 2rem;
      color: #111827;
    }

    .btn {
      width: 100%;
      padding: 0.9rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-bottom: 1rem;
    }

    .btn-primary {
      background: #3956E8;
      color: white;
    }

    .btn-secondary {
      background: white;
      color: #3956E8;
      border: 2px solid #3956E8;
    }

    /* FOOTER */
    .footer {
      margin-top: 40px;
      text-align: center;
    }

    .support-title {
      font-size: 13px;
      font-weight: 600;
      color: #6B7280;
      margin-bottom: 4px;
    }

    .support-text {
      font-size: 12px;
      color: #6B7280;
      margin: 2px 0;
    }

    .support-text a {
      color: #3956E8;
      text-decoration: none;
    }

    .legal-links {
      margin-top: 8px;
      font-size: 12px;
    }

    .legal-links a {
      color: #3956E8;
      text-decoration: none;
      font-weight: 500;
    }

    .legal-links span {
      margin: 0 6px;
      color: #9CA3AF;
    }
  </style>
</head>

<body>

<div class="container">

  <img src="https://cadamenudo.github.io/UI-UX/assets/logo/cadamenudo_logo_BLUE.png" class="logo">

  <h1>Bienvenido a Cada Menudo</h1>

  <button class="btn btn-primary" onclick="location.href='registro.html'">
    Crear una cuenta en Cada Menudo
  </button>

  <!-- ✅ LINK CORREGIDO -->
  <button class="btn btn-secondary" onclick="location.href='https://cadamenudo.github.io/UI-UX/iniciar_sesion.html'">
    Ingresar a la app
  </button>

  <!-- FOOTER -->
  <div class="footer">
    <p class="support-title">¿Preguntas?</p>
    <p class="support-text">Servicio al consumidor</p>
    <p class="support-text">
      <a href="tel:+17862029171">+1 (786) 202-9171</a> & 
      <a href="tel:+18507400274">+1 (850) 740-0274</a>
    </p>
    <p class="support-text">
      <a href="mailto:tech@cadamenudo.com">tech@cadamenudo.com</a>
    </p>
    <div class="legal-links">
      <a href="terminos.html">Términos</a>
      <span>•</span>
      <a href="privacidad.html">Privacidad</a>
    </div>
  </div>

</div>

</body>
</html>
