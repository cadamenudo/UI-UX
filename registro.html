<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro - Cada Menudo</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #FFFFFF;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .registro-container {
      max-width: 400px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 1vh 1.5rem;
      margin-top: 1vh;
      box-sizing: border-box;
      text-align: center;
    }

    .logo {
      width: 300px;
      margin-bottom: 0.25rem;
    }

    h2 {
      margin-bottom: 1rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 100%;
    }

    .input-group input {
      padding: 0.75rem 1rem;
      border: 1px solid #D1D5DB;
      border-radius: 10px;
      width: 100%;
    }

    .input-password {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }

    button {
      background-color: #3956E8;
      color: white;
      padding: 0.75rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .login-link {
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #3956E8;
      font-weight: bold;
      text-decoration: none;
    }

    /* FOOTER */
    .footer {
      margin-top: 25px;
      text-align: center;
    }

    .support-title {
      font-size: 13px;
      font-weight: 600;
      color: #6B7280;
    }

    .support-text {
      font-size: 12px;
      color: #6B7280;
    }

    .support-text a {
      color: #3956E8;
      text-decoration: none;
    }

    .legal-links {
      margin-top: 8px;
      font-size: 12px;
    }

    .legal-links a {
      color: #3956E8;
      text-decoration: none;
    }

    .legal-links span {
      margin: 0 6px;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 99;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    .modal-content {
      background: white;
      margin: 10% auto;
      padding: 1rem;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
    }

  </style>
</head>

<body>

<div class="registro-container">

  <img src="https://cadamenudo.github.io/UI-UX/assets/logo/cadamenudo_logo_BLUE.png" class="logo">

  <h2>Crea una cuenta</h2>

  <form>

    <div class="input-group">
      <input type="text" placeholder="Nombre">
    </div>

    <div class="input-group">
      <input type="email" placeholder="Correo">
    </div>

    <div class="input-group input-password">
      <input type="password" placeholder="Contraseña">
      <span class="toggle-password" onclick="togglePassword()">👁</span>
    </div>

    <label>
      <input type="checkbox" required>
      Acepto <a href="#">Términos</a> y <a href="#">Privacidad</a>
    </label>

    <button>REGISTRARSE</button>

  </form>

  <p class="login-link">
    ¿Ya tienes una cuenta? 
    <a href="https://cadamenudo.github.io/UI-UX/iniciar_sesion.html">Inicia sesión</a>
  </p>

  <!-- FOOTER -->
  <div class="footer">
    <p class="support-title">¿Preguntas?</p>
    <p class="support-text">Servicio al consumidor</p>
    <p class="support-text">
      <a href="tel:+17862029171">+1 (786) 202-9171</a> & 
      <a href="tel:+18507400274">+1 (850) 740-0274</a>
    </p>
    <p class="support-text">
      <a href="mailto:tech@cadamenudo.com">tech@cadamenudo.com</a>
    </p>
    <div class="legal-links">
      <a href="#">Términos</a>
      <span>•</span>
      <a href="#">Privacidad</a>
    </div>
  </div>

</div>

<script>
function togglePassword() {
  const input = document.querySelector('input[type="password"]');
  input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
