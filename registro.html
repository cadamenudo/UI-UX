<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Crear cuenta</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Nunito',sans-serif;
  background:#ffffff;
  color:#111827;
  display:flex;
  justify-content:center;
}

.registro-container{
  width:100%;
  max-width:420px;
  padding:2rem 1.5rem 3rem;
}

.logo{
  width:250px;
  display:block;
  margin:0 auto 1rem;
}

h2{
  text-align:center;
  color:#6B7280;
  margin-bottom:1.5rem;
  font-size:1.4rem;
}

form{
  display:flex;
  flex-direction:column;
  gap:1rem;
}

input,select{
  width:100%;
  padding:1rem;
  border:1.5px solid #D1D5DB;
  border-radius:16px;
  font-size:1rem;
  font-family:inherit;
}

input:focus,
select:focus{
  outline:none;
  border-color:#3956E8;
}

.row{
  display:flex;
  gap:.75rem;
}

.small{
  width:38%;
}

.big{
  width:62%;
}

.password-wrap{
  position:relative;
}

.eye{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:1.1rem;
}

.terms{
  display:flex;
  align-items:flex-start;
  gap:.7rem;
}

.terms input{
  width:22px;
  height:22px;
  margin-top:3px;
  accent-color:#3956E8;
  flex-shrink:0;
}

.terms label{
  font-size:.92rem;
  line-height:1.42;
  color:#64748B;
}

.terms a{
  color:#3956E8;
  font-weight:700;
  text-decoration:none;
}

button{
  border:none;
  padding:1rem;
  border-radius:12px;
  font-size:1rem;
  font-weight:800;
  background:#E5E7EB;
  color:#9CA3AF;
}

button.active{
  background:#3956E8;
  color:#ffffff;
  cursor:pointer;
}

/* MODAL */

.sms-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:1rem;
}

.sms-modal.active{
  display:flex;
}

.sms-box{
  width:100%;
  max-width:420px;
  height:85vh;
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  position:relative;
}

.sms-box iframe{
  width:100%;
  height:100%;
  border:none;
}

.close{
  position:absolute;
  top:10px;
  right:10px;
  width:34px;
  height:34px;
  border:none;
  border-radius:50%;
  background:#3956E8;
  color:#fff;
  font-size:22px;
  cursor:pointer;
  z-index:10;
}
</style>
</head>

<body>

<div class="registro-container">

<img class="logo" src="https://cadamenudo.github.io/UI-UX/assets/logo/cadamenudo_logo_BLUE.png">

<h2>Crea tu cuenta</h2>

<form id="registroForm">

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="usuario" placeholder="Nombre de usuario (o Email)">

<div class="row">
  <div class="small">
    <select id="pais">
      <option value="+1">🇺🇸 +1</option>
      <option value="+1">🇵🇷 +1</option>
      <option value="+52">🇲🇽 +52</option>
      <option value="+34">🇪🇸 +34</option>
      <option value="+58">🇻🇪 +58</option>
    </select>
  </div>

  <div class="big">
    <input type="tel" id="telefono" placeholder="Teléfono">
  </div>
</div>

<div class="password-wrap">
  <input type="password" id="password" placeholder="Contraseña">
  <span class="eye" onclick="togglePassword()">👁</span>
</div>

<div class="terms">
  <input type="checkbox" id="terms">

  <label for="terms">
    He leído y acepto los
    <a href="terminos.html">Términos</a> y
    <a href="privacidad.html">Políticas</a>
  </label>
</div>

<div class="terms">
  <input type="checkbox" id="smsConsent">

  <label for="smsConsent">
    Al proporcionar su número de teléfono, usted acepta recibir mensajes de texto informativos de Cada Menudo. El consentimiento no es una condición de compra. Pueden aplicarse la frecuencia de mensajes y tarifas por mensajes y datos. Responda HELP para ayuda y STOP para cancelar.
    
    <a href="#" onclick="abrirSMS();return false;">SMS Terms</a>
  </label>
</div>

<button type="submit" id="submitBtn">REGISTRAR</button>

</form>
</div>

<!-- MODAL -->

<div class="sms-modal" id="smsModal">
  <div class="sms-box">
    <button class="close" onclick="cerrarSMS()">×</button>

    <iframe src="https://cadamenudo.github.io/UI-UX/sms-terms.html"></iframe>
  </div>
</div>

<script>
const form = document.getElementById("registroForm");
const btn = document.getElementById("submitBtn");

function togglePassword(){
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
}

function validar(){
  const nombre = document.getElementById("nombre").value.trim();
  const usuario = document.getElementById("usuario").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const password = document.getElementById("password").value.trim();
  const terms = document.getElementById("terms").checked;
  const sms = document.getElementById("smsConsent").checked;

  if(nombre && usuario && telefono && password && terms && sms){
    btn.classList.add("active");
  }else{
    btn.classList.remove("active");
  }
}

form.addEventListener("input", validar);
form.addEventListener("change", validar);

form.addEventListener("submit", function(e){
  e.preventDefault();

  if(!btn.classList.contains("active")) return;

  alert("Registro simulado");
});

function abrirSMS(){
  document.getElementById("smsModal").classList.add("active");
}

function cerrarSMS(){
  document.getElementById("smsModal").classList.remove("active");
}
</script>

</body>
</html>
